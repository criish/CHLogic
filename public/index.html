<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH Logic | Painel</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
        header { background: #161b27; padding: 14px 32px; border-bottom: 1px solid #1e2535; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .badge { background: #00c896; color: #000; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 10px; }
        .btn-logout { background: transparent; border: 1px solid #30363d; color: #f85149; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        main { padding: 32px; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 32px; }
        .card { background: #161b27; border: 1px solid #1e2535; border-radius: 12px; padding: 24px; }
        .card-title { font-size: 0.9rem; font-weight: 600; color: #8b949e; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 8px; }
        input { width: 100%; background: #0f1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .btn-primary { width: 100%; background: #00c896; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
        .btn-secondary { width: 100%; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .log-box { height: 400px; background: #0d1117; border: 1px solid #1e2535; border-radius: 8px; padding: 16px; font-family: monospace; overflow-y: auto; color: #a5d6ff; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-on { background: #00c896; }
        .status-off { background: #f85149; }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal { background: #161b27; border: 1px solid #1e2535; border-radius: 12px; width: 400px; padding: 24px; text-align: center; }
        #qrDisplay { background: #fff; width: 220px; height: 220px; margin: 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        #qrDisplay img { width: 90%; }
        #pairingCodeDisplay { font-size: 1.8rem; color: #00c896; letter-spacing: 5px; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <header>
        <div><h1>CH LOGIC <span class="badge">ULTRA V2</span></h1></div>
        <div><span id="userDisplay" style="margin-right:15px; font-size:0.8rem"></span><button class="btn-logout" onclick="location.href='/login.html'">Sair</button></div>
    </header>
    <main>
        <aside>
            <div class="card">
                <div class="card-title">⚙️ CONFIGURAÇÕES</div>
                <div class="form-group"><label>URL DO PAINEL SIGMA</label><input type="text" id="sigmaUrl"></div>
                <div class="form-group"><label>HORÁRIO DE COBRANÇA</label><input type="time" id="horarioCobranca"></div>
                <button class="btn-primary" onclick="salvarConfig()">Salvar e Sincronizar</button>
                <button class="btn-secondary" onclick="abrirModalZap()">Conectar WhatsApp</button>
                <div style="margin-top:20px; font-size:0.8rem">
                    <p>WhatsApp: <span id="statusZap"><span class="status-dot status-off"></span>Off</span></p>
                </div>
            </div>
        </aside>
        <section>
            <div class="card">
                <div class="card-title">🚀 LOGS DO SISTEMA <button class="btn-secondary" style="width:auto; padding:5px 15px" onclick="addLog('Varredura manual...')">Varrer Agora</button></div>
                <div class="log-box" id="logBox"></div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalZap">
        <div class="modal">
            <div class="card-title"><span>CONEXÃO WHATSAPP</span> <span style="cursor:pointer" onclick="fecharModalZap()">✖</span></div>
            <div id="qrDisplay"><p style="color:#000; font-size:0.7rem">Aguardando QR...</p></div>
            <div style="border-top:1px solid #30363d; padding-top:15px; margin-top:15px">
                <label>OU VIA NÚMERO (COM DDD)</label>
                <input type="text" id="phonePairing" placeholder="5519..." style="margin:10px 0">
                <button class="btn-secondary" onclick="gerarCodigo()">Gerar Código</button>
                <div id="pairingCodeDisplay"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        socket.on('connect', () => {
            fetch('/api/me').then(r => r.json()).then(user => {
                document.getElementById('userDisplay').textContent = `ID: ${user.id}`;
                socket.emit('join_room', user.id);
            });
        });
        socket.on('qr_code', (url) => { document.getElementById('qrDisplay').innerHTML = `<img src="${url}">`; });
        socket.on('pairing_code', (c) => { document.getElementById('pairingCodeDisplay').textContent = c; });
        socket.on('novo_log', (m) => addLog(m));
        socket.on('status_update', (d) => {
            document.getElementById('statusZap').innerHTML = d.conectado ? '<span class="status-dot status-on"></span>On' : '<span class="status-dot status-off"></span>Off';
            if(d.conectado) fecharModalZap();
        });
        function abrirModalZap() { document.getElementById('modalZap').style.display = 'flex'; }
        function fecharModalZap() { document.getElementById('modalZap').style.display = 'none'; }
        function gerarCodigo() { socket.emit('request_pairing_code', { numero: document.getElementById('phonePairing').value }); }
        function salvarConfig() {
            const url = document.getElementById('sigmaUrl').value;
            const horario = document.getElementById('horarioCobranca').value;
            socket.emit('save_config', { url, horario });
        }
        socket.on('open_sigma_tab', (d) => { window.open(d.url, '_blank'); });
        function addLog(m) {
            const b = document.getElementById('logBox');
            const d = document.createElement('div'); d.textContent = `> ${m}`;
            b.appendChild(d); b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
