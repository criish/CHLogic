<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH Logic Sniper - Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal-header { border-bottom: none; }
        #wa-display { 
            min-height: 250px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            background-color: #ffffff;
            border: 2px dashed #dee2e6;
        }
        #pairing-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: #25D366;
            font-weight: bold;
        }
        .hr-text {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 15px 0;
            color: #6c757d;
        }
        .hr-text::before, .hr-text::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        .hr-text:not(:empty)::before { margin-right: .5em; }
        .hr-text:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">🚀 Painel de Controle</h2>
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#modalWhatsApp">
                            <i class="fab fa-whatsapp me-2"></i> Conectar WhatsApp
                        </button>
                    </div>

                    <div class="mt-4">
                        <h6>Logs do Robô:</h6>
                        <div id="logs" class="bg-dark text-success p-3 rounded" style="height: 200px; overflow-y: auto; font-size: 0.9rem;">
                            [Sistema] Aguardando conexão...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalWhatsApp" tabindex="-1" aria-labelledby="modalWhatsAppLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalWhatsAppLabel">🔗 Vincular WhatsApp</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    
                    <div id="setup-options">
                        <p class="text-muted">Selecione como deseja conectar o seu dispositivo:</p>
                        
                        <button class="btn btn-outline-primary w-100 mb-2" onclick="gerarQRCode()">
                            <i class="fas fa-qrcode me-2"></i> Conectar via QR Code
                        </button>

                        <div class="hr-text">OU</div>

                        <div class="input-group mb-3">
                            <input type="text" id="phone-number" class="form-control" placeholder="Ex: 5519999999999">
                            <button class="btn btn-success" onclick="gerarCodigoPareamento()">
                                Receber Código
                            </button>
                        </div>
                    </div>

                    <div id="wa-display" class="mt-4 rounded p-3">
                        <div id="spinner" class="spinner-border text-primary d-none" role="status"></div>
                        <canvas id="qr-canvas" class="d-none"></canvas>
                        <div id="pairing-display" class="d-none"></div>
                        <p id="status-text" class="mt-2 text-muted small">Escolha uma opção acima</p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const logsDiv = document.getElementById('logs');

        // --- Funções de Interface ---

        function mostrarLoading(msg) {
            document.getElementById('spinner').classList.remove('d-none');
            document.getElementById('qr-canvas').classList.add('d-none');
            document.getElementById('pairing-display').classList.add('d-none');
            document.getElementById('status-text').innerText = msg;
        }

        function gerarQRCode() {
            mostrarLoading("A gerar QR Code...");
            socket.emit('request_qr');
        }

        function gerarCodigoPareamento() {
            const phone = document.getElementById('phone-number').value;
            if (!phone || phone.length < 10) {
                return alert("Por favor, insira o número com DDD (Ex: 55199...)");
            }
            mostrarLoading("A solicitar código...");
            socket.emit('request_pairing', { phone: phone });
        }

        // --- Ouvintes do Socket (Comunicação com server.js) ---

        // Recebe o QR Code do servidor
        socket.on('whatsapp_qr', (qrText) => {
            document.getElementById('spinner').classList.add('d-none');
            const canvas = document.getElementById('qr-canvas');
            canvas.classList.remove('d-none');
            
            QRCode.toCanvas(canvas, qrText, { width: 220 }, (error) => {
                if (error) console.error(error);
            });
            document.getElementById('status-text').innerText = "Aponte a câmera do WhatsApp para o código";
        });

        // Recebe o Código de Pareamento (8 dígitos)
        socket.on('pairing_code', (code) => {
            document.getElementById('spinner').classList.add('d-none');
            const display = document.getElementById('pairing-display');
            display.classList.remove('d-none');
            display.innerText = code;
            document.getElementById('status-text').innerText = "Introduza este código no seu telemóvel";
        });

        // Atualização de Status
        socket.on('whatsapp_status', (data) => {
            if (data.connected) {
                document.getElementById('wa-display').innerHTML = `
                    <div class="text-success text-center">
                        <i class="fas fa-check-circle fa-4x mb-3"></i>
                        <h4>WhatsApp Conectado!</h4>
                        <p class="text-muted small">Pode fechar esta janela.</p>
                    </div>`;
            }
        });

        // Logs em tempo real
        socket.on('novo_log', (msg) => {
            const p = document.createElement('div');
            p.innerText = msg;
            logsDiv.appendChild(p);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        });
    </script>
</body>
</html>
