<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH Logic | Painel de Automação</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #161b27;
            padding: 16px 32px;
            border-bottom: 1px solid #1e2535;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        header span {
            background: #00c896;
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            padding: 24px 32px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: #161b27;
            border: 1px solid #1e2535;
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #aab;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #778;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: #0f1117;
            border: 1px solid #1e2535;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 0.9rem;
            transition: border 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00c896;
        }

        .form-group input[type="time"] {
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 10px;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { opacity: 0.9; }

        .btn-primary { background: #00c896; color: #000; }
        .btn-secondary { background: #1e2a3a; color: #aab; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-warning { background: #f39c12; color: #000; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-badge.connected { background: #0d3327; color: #00c896; }
        .status-badge.disconnected { background: #3a1a1a; color: #e74c3c; }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .divider {
            border: none;
            border-top: 1px solid #1e2535;
            margin: 20px 0;
        }

        .horario-info {
            background: #0f1117;
            border: 1px solid #1e2535;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.82rem;
            color: #778;
            margin-top: 8px;
        }

        .horario-info strong {
            color: #00c896;
        }

        /* LOG */
        .log-card {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .log-card h2 {
            margin-bottom: 12px;
        }

        .log-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .log-toolbar button {
            background: #1e2535;
            border: none;
            border-radius: 6px;
            color: #aab;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .log-toolbar button:hover { background: #2a3347; }

        #logBox {
            flex: 1;
            background: #0a0d14;
            border: 1px solid #1e2535;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
        }

        .log-line { color: #ccc; }
        .log-line.success { color: #00c896; }
        .log-line.error { color: #e74c3c; }
        .log-line.info { color: #3b9eff; }
        .log-line.warn { color: #f39c12; }

        .section-title {
            font-size: 0.75rem;
            color: #556;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0 8px;
        }
    </style>
</head>
<body>

<header>
    <h1>CH Logic | Painel</h1>
    <span>SNIPER v4.0</span>
</header>

<div class="container">

    <!-- COLUNA ESQUERDA -->
    <div>
        <div class="card">
            <h2>⚙️ Configurações</h2>

            <div class="form-group">
                <label>URL do Painel Sigma</label>
                <input type="text" id="painelUrl" placeholder="https://seupainelsigma.com" />
            </div>

            <button class="btn btn-primary" onclick="salvarConfig()">
                💾 Salvar e Abrir Sigma
            </button>

            <hr class="divider">

            <p class="section-title">⏰ Agendamento de Cobrança</p>

            <div class="form-group">
                <label>Horário diário de varredura automática</label>
                <input type="time" id="horarioCobranca" value="08:00" />
            </div>

            <button class="btn btn-primary" onclick="salvarHorario()">
                ⏰ Salvar Horário
            </button>

            <div class="horario-info" id="horarioInfo">
                Carregando horário...
            </div>

            <hr class="divider">

            <button class="btn btn-warning" onclick="rodarAgora()">
                ▶️ Rodar Varredura Agora
            </button>

            <hr class="divider">

            <p class="section-title">📱 WhatsApp</p>

            <div id="whatsappStatus">
                <div class="status-badge disconnected">
                    <div class="dot"></div> Desconectado
                </div>
            </div>

            <button class="btn btn-secondary" style="margin-top: 12px;" onclick="conectarWhatsApp()">
                📱 Conectar WhatsApp
            </button>

        </div>
    </div>

    <!-- COLUNA DIREITA -->
    <div class="card log-card">
        <h2>📋 Logs do Sistema</h2>

        <div class="log-toolbar">
            <button onclick="limparLog()">🗑️ Limpar</button>
            <button onclick="exportarLog()">💾 Exportar</button>
        </div>

        <div id="logBox">
            <div class="log-line info">&gt; Aguardando comandos...</div>
        </div>
    </div>

</div>

<script>
    const socket = io();
    let userId = 1;

    // ── Conecta ao room do usuário
    socket.on('connect', () => {
        socket.emit('join_room', userId);
        carregarConfig();
    });

    // ── Abre aba do Sigma quando servidor mandar
    socket.on('open_sigma_tab', (data) => {
        addLog(`🕒 Abrindo painel Sigma...`, 'info');
        addLog(`👉 Faça o login na nova aba para sincronizar automaticamente.`, 'warn');
        window.open(data.url, '_blank');
    });

    // ── Recebe logs do servidor
    socket.on('novo_log', (msg) => {
        let tipo = 'log-line';
        if (msg.includes('✅') || msg.includes('🏆') || msg.includes('📦')) tipo += ' success';
        else if (msg.includes('❌')) tipo += ' error';
        else if (msg.includes('⏰') || msg.includes('📡') || msg.includes('▶️')) tipo += ' info';
        else if (msg.includes('⚠️')) tipo += ' warn';
        addLog(msg, '', tipo);
    });

    // ── Carrega configurações salvas
    async function carregarConfig() {
        try {
            const r = await fetch('/api/config');
            const d = await r.json();
            if (d.painel_url) document.getElementById('painelUrl').value = d.painel_url;
            if (d.horario_cobranca) {
                document.getElementById('horarioCobranca').value = d.horario_cobranca;
                atualizarInfoHorario(d.horario_cobranca);
            }
        } catch(e) {}
    }

    function atualizarInfoHorario(horario) {
        document.getElementById('horarioInfo').innerHTML =
            `Varredura automática agendada para <strong>${horario}</strong> todos os dias.`;
    }

    // ── Salva URL do Sigma
    function salvarConfig() {
        const url = document.getElementById('painelUrl').value.trim();
        if (!url) return alert('Digite a URL do Sigma.');
        addLog('💾 Salvando configurações...', 'info');
        socket.emit('save_config', { url });
    }

    // ── Salva horário de cobrança
    async function salvarHorario() {
        const horario = document.getElementById('horarioCobranca').value;
        if (!horario) return alert('Selecione um horário.');

        const r = await fetch('/api/set-horario', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, horario })
        });
        const d = await r.json();
        if (d.success) atualizarInfoHorario(horario);
    }

    // ── Força varredura imediata
    async function rodarAgora() {
        addLog('▶️ Iniciando varredura manual...', 'info');
        await fetch('/api/rodar-agora', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId })
        });
    }

    // ── WhatsApp (placeholder para próxima fase)
    function conectarWhatsApp() {
        addLog('📱 Módulo WhatsApp em breve...', 'warn');
    }

    // ── Helpers de log
    function addLog(msg, tipo = '', classe = '') {
        const box = document.getElementById('logBox');
        const div = document.createElement('div');
        div.className = classe || `log-line ${tipo}`;
        div.textContent = '> ' + msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function limparLog() {
        document.getElementById('logBox').innerHTML = '<div class="log-line info">> Log limpo.</div>';
    }

    function exportarLog() {
        const linhas = [...document.querySelectorAll('#logBox div')].map(d => d.textContent).join('\n');
        const blob = new Blob([linhas], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ch-logic-log-${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }
</script>
</body>
</html>
