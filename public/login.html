<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH Logic | Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c14;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,200,150,.06) 0,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(59,158,255,.06) 0,transparent 60%)}
.card{background:#0f1521;border:1px solid #1a2540;border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:2rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#00c896,#3b9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.78rem;color:#3a4a60;margin-top:4px;letter-spacing:1px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.75rem;color:#556;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
input{width:100%;padding:12px 14px;background:#080c14;border:1px solid #1a2540;border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none;transition:border .2s,box-shadow .2s}
input:focus{border-color:#00c896;box-shadow:0 0 0 3px rgba(0,200,150,.1)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#00c896,#00a87a);color:#000;font-weight:700;font-size:.92rem;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:8px}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.erro{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:8px;color:#e74c3c;font-size:.82rem;padding:10px 14px;margin-top:12px;display:none}
.footer{text-align:center;margin-top:24px;font-size:.72rem;color:#1a2540}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">CH LOGIC</div>
    <div class="logo-sub">SISTEMA DE COBRANÇA IPTV</div>
  </div>
  <div class="form-group">
    <label>Usuário</label>
    <input type="text" id="user" placeholder="seu_usuario" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" id="btn" onclick="login()">Entrar no Sistema</button>
  <div class="erro" id="erro"></div>
  <div class="footer">CH Logic © 2026 — Todos os direitos reservados</div>
</div>
<script>
async function login(){
  const user=document.getElementById('user').value.trim();
  const pass=document.getElementById('pass').value;
  const erro=document.getElementById('erro');
  const btn=document.getElementById('btn');
  erro.style.display='none';
  if(!user||!pass){erro.textContent='Preencha usuário e senha.';erro.style.display='block';return;}
  btn.textContent='Entrando...';btn.disabled=true;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})});
    const d=await r.json();
    if(r.ok){window.location.href='/';}
    else{erro.textContent=d.error||'Credenciais inválidas.';erro.style.display='block';btn.textContent='Entrar no Sistema';btn.disabled=false;}
  }catch(e){erro.textContent='Erro de conexão.';erro.style.display='block';btn.textContent='Entrar no Sistema';btn.disabled=false;}
}
</script>
</body>
</html>
