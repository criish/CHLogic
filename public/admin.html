<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CH Logic | Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--surface:#0f1521;--border:#1a2540;--text:#e0e0e0;--muted:#3a4a60;--green:#00c896;--red:#e74c3c;--yellow:#f39c12}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:40px 20px}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.card-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}
.logo{font-size:1.3rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--green),#3b9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.fg{flex:1;min-width:140px}
.fg label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;font-weight:600}
input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s}
input:focus{border-color:var(--green)}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-primary{background:var(--green);color:#000}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:#22c55e;color:#000}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-ghost{background:var(--border);color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid rgba(26,37,64,.5);font-size:.83rem;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(26,37,64,.3)}
.on{color:var(--green);font-weight:700}
.off{color:var(--red);font-weight:700}
.actions{display:flex;gap:6px}
/* Login */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:90vh;width:100%}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;width:340px}
.login-box input{margin-bottom:12px}
.login-box .btn{width:100%;padding:12px;margin-top:4px}
.erro{color:var(--red);font-size:.8rem;text-align:center;margin-top:10px;display:none}
.msg{font-size:.8rem;margin-top:10px;display:none}
</style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="logo">CH LOGIC</div>
    <div class="sub" style="margin-bottom:24px">Painel Administrativo</div>
    <input type="text" id="au" placeholder="Usuário admin"/>
    <input type="password" id="ap" placeholder="Senha" onkeydown="if(event.key==='Enter')loginAdmin()"/>
    <button class="btn btn-primary" onclick="loginAdmin()">Entrar</button>
    <p class="erro" id="lerro"></p>
  </div>
</div>

<div id="painel" class="container" style="display:none">
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px">
    <div><div class="logo">CH LOGIC</div><div class="sub">Painel Administrativo</div></div>
    <button class="btn btn-danger btn-sm" onclick="sair()">Sair</button>
  </div>

  <div class="card">
    <div class="card-title">➕ Cadastrar Novo Cliente</div>
    <div class="row">
      <div class="fg"><label>Login</label><input type="text" id="nu" placeholder="nome_cliente"/></div>
      <div class="fg"><label>Senha</label><input type="password" id="np" placeholder="senha forte"/></div>
      <button class="btn btn-primary" onclick="addUser()">Cadastrar</button>
    </div>
    <p id="addMsg" class="msg"></p>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin:0">👥 Clientes Cadastrados</div>
      <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↻ Atualizar</button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>ID</th><th>Usuário</th><th>Horário</th><th>Sigma</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="userList"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
async function loginAdmin(){
  const user=document.getElementById('au').value;
  const pass=document.getElementById('ap').value;
  const erro=document.getElementById('lerro');
  const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})});
  if(r.ok){document.getElementById('loginWrap').style.display='none';document.getElementById('painel').style.display='block';loadUsers();}
  else{const d=await r.json();erro.textContent=d.error||'Acesso negado.';erro.style.display='block';}
}

async function loadUsers(){
  const r=await fetch('/api/admin/users');
  if(!r.ok)return;
  const users=await r.json();
  const list=document.getElementById('userList');
  if(!users.length){list.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Nenhum cliente.</td></tr>';return;}
  list.innerHTML=users.map(u=>`
    <tr>
      <td style="color:var(--muted)">#${u.id}</td>
      <td><strong>${u.username}</strong></td>
      <td style="color:var(--muted)">${u.horario_cobranca||'—'}</td>
      <td style="font-size:.75rem;color:var(--muted)">${u.sigma_url?'✅ '+u.sigma_url.slice(0,30)+'…':'—'}</td>
      <td>${u.ativo?'<span class="on">✅ Ativo</span>':'<span class="off">❌ Suspenso</span>'}</td>
      <td>
        <div class="actions">
          <button class="btn btn-sm ${u.ativo?'btn-danger':'btn-success'}" onclick="toggleUser(${u.id},${u.ativo?0:1})">
            ${u.ativo?'Suspender':'Ativar'}
          </button>
          <button class="btn btn-sm btn-ghost" onclick="resetSenha(${u.id})">🔑 Senha</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id},'${u.username}')">🗑</button>
        </div>
      </td>
    </tr>`).join('');
}

async function addUser(){
  const username=document.getElementById('nu').value.trim();
  const password=document.getElementById('np').value;
  const msg=document.getElementById('addMsg');
  if(!username||!password){showMsg('Preencha todos os campos.',false);return;}
  const r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const d=await r.json();
  if(r.ok){showMsg(`✅ Cliente "${username}" cadastrado!`,true);document.getElementById('nu').value='';document.getElementById('np').value='';loadUsers();}
  else showMsg(d.error||'Erro ao cadastrar.',false);
}

function showMsg(txt,ok){
  const m=document.getElementById('addMsg');
  m.textContent=txt;m.style.color=ok?'var(--green)':'var(--red)';m.style.display='block';
  setTimeout(()=>m.style.display='none',4000);
}

async function toggleUser(id,ativo){
  await fetch('/api/admin/users/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,ativo})});
  loadUsers();
}

async function resetSenha(id){
  const nova=prompt('Nova senha para o usuário #'+id+':');
  if(!nova)return;
  const r=await fetch(`/api/admin/users/${id}/senha`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:nova})});
  if(r.ok)alert('✅ Senha alterada!');
}

async function deleteUser(id,username){
  if(!confirm(`Excluir cliente "${username}"? Ação irreversível.`))return;
  await fetch(`/api/admin/users/${id}`,{method:'DELETE'});
  loadUsers();
}

function sair(){fetch('/api/logout',{method:'POST'}).then(()=>location.reload());}
</script>
</body>
</html>
